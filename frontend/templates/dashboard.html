<!DOCTYPE html>
<html>
<head>
    <title>JA4 Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            background: #0d1117;
            color: #00ff9c;
            font-family: monospace;
        }

        h1 {
            text-align: center;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #00ff9c;
            padding: 6px;
            text-align: center;
        }

        .alert {
            color: red;
            font-weight: bold;
        }

        canvas {
            margin-top: 20px;
            background: #111;
        }
    </style>
</head>
<body>

<h1>🔐 JA4 Traffic Dashboard</h1>

<div class="container">

    <!-- 📊 GRAPH -->
    <canvas id="chart"></canvas>

    <!-- 🚨 ALERTS -->
    <h2>🚨 Alerts</h2>
    <ul id="alerts"></ul>

    <!-- 📋 LOGS -->
    <h2>📋 Logs</h2>
    <table id="logTable">
        <tr>
            <th>Time</th>
            <th>Source</th>
            <th>Destination</th>
            <th>App</th>
            <th>JA4</th>
        </tr>
    </table>

</div>

<script>
const socket = io();

let chart;

// Initialize chart
function createChart(labels, values) {
    const ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Traffic",
                data: values
            }]
        }
    });
}

// Update chart
function updateChart(data) {
    const apps = {};

    data.forEach(row => {
        const app = row[5];
        apps[app] = (apps[app] || 0) + 1;
    });

    const labels = Object.keys(apps);
    const values = Object.values(apps);

    if (!chart) {
        createChart(labels, values);
    } else {
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.update();
    }
}

// Update logs
function updateLogs(data) {
    const table = document.getElementById("logTable");

    table.innerHTML = `
        <tr>
            <th>Time</th>
            <th>Source</th>
            <th>Destination</th>
            <th>App</th>
            <th>JA4</th>
        </tr>
    `;

    data.forEach(row => {
        const r = table.insertRow();
        r.innerHTML = `
            <td>${row[1]}</td>
            <td>${row[2]}</td>
            <td>${row[3]}</td>
            <td>${row[5]}</td>
            <td>${row[4]}</td>
        `;
    });
}

// Update alerts
function updateAlerts(alerts) {
    const list = document.getElementById("alerts");
    list.innerHTML = "";

    alerts.forEach(a => {
        const li = document.createElement("li");
        li.className = "alert";
        li.textContent = `${a[2]} → ${a[3]} : ${a[4]}`;
        list.appendChild(li);
    });
}

// Socket listener
socket.on("update_data", (data) => {
    updateLogs(data.logs);
    updateAlerts(data.alerts);
    updateChart(data.logs);
});
</script>

</body>
</html>
